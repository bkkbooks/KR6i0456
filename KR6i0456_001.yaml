body:
  text: 爾時目連尊者昔日往到羽州追陽縣見一血盆池地獄闊八萬四千由旬池中有一百二十件事鐵梁鐵柱鐵枷鐵鎖見南閻浮提女人許多被頭散髮長枷杻手在地獄中受罪獄卒鬼王一日三度將血勒教罪人喫此時罪人不甘伏喫遂被獄主將鐵棒打作呌聲目連悲哀問獄主不見南閻浮提丈夫之人受此苦報只見許多女人受其苦痛獄主答師言不干丈夫之事只是女人産下血露污觸地神若穢污衣裳將去溪河洗澤水流污漫誤諸善男女取水煎茶供養諸聖致令不淨天大將軍劄下名字附在善惡部中候百年命終之後受此苦報目連悲哀遂問獄主將何報答産生阿娘之恩出離血盆池地獄獄主答師言惟有小心孝順男女敬重三寶更為阿娘持血盆齊三年仍結血盆勝會請僧轉誦此經一藏滿日懺散便有般若船載過奈河江岸看見血盆池中有五朵蓮華出現罪人歡喜心生慙愧便得超生佛地諸大菩薩及目連尊者啓告來勸南閻浮提人信善男女早覺修取大辦前程莫教失手萬劫難復佛告說女人血盆經若有信心書寫受持令得三世母親盡得生天受諸快樂衣食自然長命富貴爾時天龍八部人非人等皆大歡喜信受奉行作禮而退
